apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusgenome-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusgenome-ui
  template:
    metadata:
      labels:
        app: nexusgenome-ui
    spec:
      containers:
      - name: frontend
        # REPLACE 'your-dockerhub-username' WITH YOUR ACTUAL DOCKER HUB ID
        image: tejassolanki3/nexusgenome-ui:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: nexusgenome-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
